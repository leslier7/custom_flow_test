# Core macro (760x760 um, placed at lower-left of interior region)
core 260 260 N

# Bottom pads: N orientation (140 wide x 200 tall), PAD faces outward (Y=0)
# IN/OUT signal pins at Y=200 side, facing chip interior
clk_io   300 0 N
reset_io 480 0 N
cs_io    660 0 N
sclk_io  840 0 N

# Right pads: W=R90 orientation (200 wide x 140 tall in die coords)
# IN/OUT at X=1080 side, facing chip interior
mosi_io       1080 345 W
gp0_io        1080 570 W
gp1_io        1080 795 W

# Top pads: S=R180 orientation (140 wide x 200 tall), PAD faces outward (Y=1280)
# IN/OUT at Y=1080 side, facing chip interior
miso_io   420 1080 S
clk_out_io 720 1080 S

# Left pads: E=R270 orientation (200 wide x 140 tall in die coords)
# IN/OUT at X=200 side, facing chip interior
debug_mode_io 0 420 E
debug_out_io  0 720 E
