DESIGN_NAME: proj2_Proj2XcelChip
PDK: sky130A
VERILOG_FILES:
  - dir::build/sv2v_chip/Proj2XcelChip.v
CLOCK_PORT: clk
CLOCK_PERIOD: 10
SYNTH_DEFINES:
  - SYNTHESIS

# LVS robustness knobs
MAGIC_EXT_USE_GDS: true

# NOTE: variable name is spelled MARCO in LibreLane 3.0.3
LVS_INCLUDE_MARCO_NETLISTS: true

# Ignore physical-only cells that often create extraction/netlist asymmetry
LVS_IGNORE_CELLS:
  - sky130_fd_sc_hd__fill_1
  - sky130_fd_sc_hd__fill_2
  - sky130_fd_sc_hd__fill_4
  - sky130_fd_sc_hd__fill_8
  - sky130_fd_sc_hd__decap_3
  - sky130_fd_sc_hd__diode_2

# EXTRA_LEFS, EXTRA_GDS_FILES, and VERILOG_FILES_BLACKBOX for sky130_fd_io
# are injected by flow.py at runtime (paths are PDK-version-relative).
